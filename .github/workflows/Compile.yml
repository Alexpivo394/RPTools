name: Compile solution

on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  windows:
    name: windows-2025
    runs-on: windows-2025
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ToadTools.slnx

      - name: Fix Nice3point Repack target
        shell: pwsh
        run: |
          $target = Join-Path $env:USERPROFILE ".nuget\packages\nice3point.revit.sdk\6.2.2\Sdk\Nice3point.Revit.Repack.targets"
          $content = Get-Content $target -Raw
          $content = $content.Replace("%(identity) &quot;", "%(identity)&quot;")
          Set-Content $target $content -NoNewline

      - name: Compile solution
        run: dotnet run -c Release
        working-directory: "build"
        env:
          DOTNET_ENVIRONMENT: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}