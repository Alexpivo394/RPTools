name: Compile solution

on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  windows:
    name: windows-2025
    runs-on: windows-2025
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ToadTools.slnx

      - name: Fix Nice3point Repack target
        shell: pwsh
        run: |
          $target = Get-ChildItem `
            "$env:USERPROFILE\.nuget\packages\nice3point.revit.sdk" `
            -Filter "Nice3point.Revit.Repack.targets" `
            -Recurse |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $target) {
            throw "Nice3point.Revit.Repack.targets not found"
          }

          $content = Get-Content $target -Raw

          # Исправляет как оригинальный вариант с пробелом,
          # так и уже пропатченный вариант без пробела.
          $content = $content.Replace(
            "/lib:&quot;%(identity) &quot;",
            "/lib:&quot;%(identity).&quot;"
          )

          $content = $content.Replace(
            "/lib:&quot;%(identity)&quot;",
            "/lib:&quot;%(identity).&quot;"
          )

          Set-Content $target $content -NoNewline

          Select-String -Path $target -Pattern "_ILRepackLib"

      - name: Compile solution
        run: dotnet run -c Release
        working-directory: "build"
        env:
          DOTNET_ENVIRONMENT: ${{ github.ref_name == 'main' && 'Production' || 'Development' }}